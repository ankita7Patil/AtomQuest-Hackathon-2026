<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">GoalTrack Portal Complete System Architecture</title>
  <desc id="desc">Professional layered system architecture showing frontend, backend API, business services, MongoDB Atlas collections, and deployment platforms.</desc>
  <defs>
    <linearGradient id="header" x1="0" x2="1">
      <stop offset="0%" stop-color="#10231f"/>
      <stop offset="100%" stop-color="#35675b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#10231f" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#35675b"/>
    </marker>
    <style>
      .bg { fill: #f6f8f7; }
      .title { fill: #ffffff; font: 700 34px Arial, sans-serif; letter-spacing: 0; }
      .subtitle { fill: #d9f4ea; font: 500 16px Arial, sans-serif; }
      .layer-title { fill: #10231f; font: 700 18px Arial, sans-serif; }
      .section-label { fill: #ffffff; font: 700 14px Arial, sans-serif; }
      .card { fill: #ffffff; stroke: #cbd8d5; stroke-width: 1.4; rx: 14; filter: url(#shadow); }
      .card-blue { fill: #eef7ff; stroke: #9bc5e8; }
      .card-green { fill: #edf8f3; stroke: #9ad1bd; }
      .card-gold { fill: #fff7e6; stroke: #efc56f; }
      .card-red { fill: #fff0ef; stroke: #ee9c95; }
      .card-purple { fill: #f5efff; stroke: #c8a9ec; }
      .card-mint { fill: #ecfbf7; stroke: #8ad1c2; }
      .card-title { fill: #10231f; font: 700 19px Arial, sans-serif; }
      .body { fill: #29413c; font: 500 13.5px Arial, sans-serif; }
      .small { fill: #5b6f6b; font: 500 12px Arial, sans-serif; }
      .pill { fill: #d9f4ea; stroke: #8ad1c2; stroke-width: 1; rx: 12; }
      .pill-text { fill: #23584e; font: 700 13px Arial, sans-serif; }
      .line { stroke: #35675b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7b8f8b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .icon { font: 700 30px Arial, sans-serif; fill: #35675b; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1050"/>
  <rect x="55" y="34" width="1490" height="96" rx="22" fill="url(#header)" filter="url(#shadow)"/>
  <text x="90" y="86" class="title">GoalTrack Portal - Complete System Architecture</text>
  <text x="92" y="113" class="subtitle">React + Tailwind frontend, Express REST API, JWT/RBAC security, MongoDB Atlas persistence, and CSV reporting</text>

  <!-- Layer rails -->
  <rect x="55" y="170" width="18" height="170" rx="9" fill="#4d93c6"/>
  <rect x="55" y="370" width="18" height="190" rx="9" fill="#4aa888"/>
  <rect x="55" y="590" width="18" height="210" rx="9" fill="#d28743"/>
  <rect x="55" y="830" width="18" height="150" rx="9" fill="#8b6ab8"/>

  <text x="92" y="184" class="layer-title">Layer 1 - User Experience Interface</text>
  <text x="92" y="384" class="layer-title">Layer 2 - Secure API Gateway and Authentication</text>
  <text x="92" y="604" class="layer-title">Layer 3 - Business Logic and Workflow Engine</text>
  <text x="92" y="844" class="layer-title">Layer 4 - Data Persistence and Cloud Deployment</text>

  <!-- Client Interface -->
  <rect x="700" y="155" width="200" height="34" class="pill"/>
  <text x="743" y="177" class="pill-text">Client Interface</text>

  <!-- UI cards -->
  <rect x="105" y="215" width="300" height="92" class="card card-blue"/>
  <text x="128" y="253" class="icon">AD</text>
  <text x="188" y="247" class="card-title">Admin Dashboard</text>
  <text x="188" y="274" class="body">User management, audit trail</text>
  <text x="188" y="294" class="small">Creates managers, employees, admins</text>

  <rect x="450" y="215" width="300" height="92" class="card card-green"/>
  <text x="473" y="253" class="icon">MG</text>
  <text x="533" y="247" class="card-title">Manager Dashboard</text>
  <text x="533" y="274" class="body">Team approvals and progress review</text>
  <text x="533" y="294" class="small">Approve or reject submitted goals</text>

  <rect x="795" y="215" width="300" height="92" class="card card-gold"/>
  <text x="818" y="253" class="icon">EM</text>
  <text x="878" y="247" class="card-title">Employee Dashboard</text>
  <text x="878" y="274" class="body">Goal creation and quarterly tracking</text>
  <text x="878" y="294" class="small">Submit goals and update check-ins</text>

  <rect x="1140" y="215" width="320" height="92" class="card card-mint"/>
  <text x="1163" y="253" class="icon">UI</text>
  <text x="1223" y="247" class="card-title">React + Vite Frontend</text>
  <text x="1223" y="274" class="body">Tailwind CSS responsive experience</text>
  <text x="1223" y="294" class="small">Hosted on Vercel</text>

  <!-- API row -->
  <rect x="150" y="420" width="235" height="116" class="card card-blue"/>
  <text x="174" y="456" class="card-title">Express REST API</text>
  <text x="174" y="486" class="body">/api/auth/login</text>
  <text x="174" y="508" class="body">/api/dashboard, /api/goals</text>
  <text x="174" y="530" class="body">/api/users, /api/reports</text>

  <rect x="430" y="420" width="235" height="116" class="card card-green"/>
  <text x="454" y="456" class="card-title">JWT Authentication</text>
  <text x="454" y="486" class="body">Stateless secure tokens</text>
  <text x="454" y="508" class="body">Protected API routes</text>
  <text x="454" y="530" class="body">Current user context</text>

  <rect x="710" y="420" width="235" height="116" class="card card-gold"/>
  <text x="734" y="456" class="card-title">RBAC Middleware</text>
  <text x="734" y="486" class="body">Admin, Manager, Employee</text>
  <text x="734" y="508" class="body">Role-specific permissions</text>
  <text x="734" y="530" class="body">Scoped data visibility</text>

  <rect x="990" y="420" width="235" height="116" class="card card-purple"/>
  <text x="1014" y="456" class="card-title">Audit Logger</text>
  <text x="1014" y="486" class="body">User and goal actions</text>
  <text x="1014" y="508" class="body">Report export logs</text>
  <text x="1014" y="530" class="body">Admin and manager views</text>

  <rect x="1270" y="420" width="235" height="116" class="card card-red"/>
  <text x="1294" y="456" class="card-title">Error Handling</text>
  <text x="1294" y="486" class="body">Centralized responses</text>
  <text x="1294" y="508" class="body">Validation messages</text>
  <text x="1294" y="530" class="body">Production-safe errors</text>

  <!-- Business logic -->
  <rect x="130" y="650" width="250" height="118" class="card card-gold"/>
  <text x="154" y="686" class="card-title">User Management</text>
  <text x="154" y="716" class="body">Create users by role</text>
  <text x="154" y="738" class="body">Assign employee manager</text>
  <text x="154" y="760" class="body">Password hashing</text>

  <rect x="425" y="632" width="270" height="154" class="card card-gold"/>
  <text x="449" y="668" class="card-title">Goal Engine</text>
  <text x="449" y="698" class="body">Create and edit goals</text>
  <text x="449" y="720" class="body">Submit plans for review</text>
  <text x="449" y="742" class="body">Approval workflow status</text>
  <text x="449" y="764" class="body">Planned vs actual values</text>

  <rect x="745" y="625" width="250" height="168" class="card card-mint"/>
  <text x="769" y="661" class="card-title">Service Logic Core</text>
  <text x="769" y="691" class="body">Coordinates users, goals,</text>
  <text x="769" y="713" class="body">check-ins, reports, audit logs,</text>
  <text x="769" y="735" class="body">and role-scoped data access</text>

  <rect x="1040" y="632" width="250" height="72" class="card card-green"/>
  <text x="1064" y="667" class="card-title">Validation Engine</text>
  <text x="1064" y="694" class="body">100% total, min 10%, max 8</text>

  <rect x="1040" y="730" width="250" height="72" class="card card-green"/>
  <text x="1064" y="765" class="card-title">Quarterly Check-ins</text>
  <text x="1064" y="792" class="body">Q1-Q4 planned vs actual progress</text>

  <rect x="1335" y="660" width="220" height="118" class="card card-mint"/>
  <text x="1359" y="696" class="card-title">Reports</text>
  <text x="1359" y="726" class="body">CSV data export</text>
  <text x="1359" y="748" class="body">Goal portfolio metrics</text>
  <text x="1359" y="770" class="body">Role-filtered views</text>

  <!-- Database row -->
  <rect x="110" y="890" width="220" height="96" class="card card-green"/>
  <text x="134" y="928" class="card-title">MongoDB Atlas</text>
  <text x="134" y="956" class="body">Cloud managed cluster</text>
  <text x="134" y="978" class="small">Persistent data storage</text>

  <rect x="380" y="875" width="210" height="120" class="card card-blue"/>
  <text x="404" y="910" class="card-title">Users Collection</text>
  <text x="404" y="938" class="small">name, email, role</text>
  <text x="404" y="958" class="small">password hash</text>
  <text x="404" y="978" class="small">department, manager</text>

  <rect x="640" y="875" width="210" height="120" class="card card-purple"/>
  <text x="664" y="910" class="card-title">Goals Collection</text>
  <text x="664" y="938" class="small">title, description</text>
  <text x="664" y="958" class="small">weightage, status</text>
  <text x="664" y="978" class="small">approval, owner, manager</text>

  <rect x="900" y="875" width="210" height="120" class="card card-gold"/>
  <text x="924" y="910" class="card-title">Check-ins</text>
  <text x="924" y="938" class="small">quarter, planned</text>
  <text x="924" y="958" class="small">actual, comments</text>
  <text x="924" y="978" class="small">updated by</text>

  <rect x="1160" y="875" width="210" height="120" class="card card-red"/>
  <text x="1184" y="910" class="card-title">Audit Logs</text>
  <text x="1184" y="938" class="small">actor, action</text>
  <text x="1184" y="958" class="small">entity, metadata</text>
  <text x="1184" y="978" class="small">timestamp</text>

  <rect x="1420" y="875" width="135" height="120" class="card card-mint"/>
  <text x="1444" y="910" class="card-title">Deploy</text>
  <text x="1444" y="938" class="small">Vercel</text>
  <text x="1444" y="958" class="small">Render</text>
  <text x="1444" y="978" class="small">Atlas</text>

  <!-- Lines -->
  <path class="line" d="M800 189 L800 407"/>
  <path class="line" d="M405 261 L430 261 L430 478 L150 478"/>
  <path class="line" d="M750 261 L775 261 L775 405"/>
  <path class="line" d="M1095 261 L1120 261 L1120 405"/>
  <path class="line" d="M1140 261 L1095 261"/>
  <path class="line" d="M385 478 L430 478"/>
  <path class="line" d="M665 478 L710 478"/>
  <path class="line" d="M945 478 L990 478"/>
  <path class="line" d="M1225 478 L1270 478"/>
  <path class="line" d="M827 536 L827 625"/>
  <path class="line" d="M548 536 L548 632"/>
  <path class="line" d="M1108 536 L1108 632"/>
  <path class="line" d="M870 793 L870 860"/>
  <path class="line" d="M380 710 L425 710"/>
  <path class="line" d="M695 710 L745 710"/>
  <path class="line" d="M995 672 L1040 672"/>
  <path class="line" d="M995 766 L1040 766"/>
  <path class="line" d="M1290 720 L1335 720"/>
  <path class="dash" d="M220 890 L220 840 L485 840 L485 875"/>
  <path class="dash" d="M220 890 L220 840 L745 840 L745 875"/>
  <path class="dash" d="M220 890 L220 840 L1005 840 L1005 875"/>
  <path class="dash" d="M220 890 L220 840 L1265 840 L1265 875"/>
  <path class="dash" d="M1370 935 L1420 935"/>

  <rect x="1260" y="45" width="250" height="58" rx="14" fill="#ffffff" opacity="0.12" stroke="#d9f4ea"/>
  <text x="1282" y="78" class="subtitle">AtomQuest Hackathon 2026</text>
  <text x="1282" y="99" class="small" fill="#d9f4ea">GoalTrack Portal</text>
</svg>
